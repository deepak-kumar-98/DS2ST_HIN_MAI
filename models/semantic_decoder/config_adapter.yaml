# ==========================================================================
# Adapter-Based S2ST — Hindi ↔ Maithili (STABLE TRAINING CONFIG)
# ==========================================================================

# --- Paths ----------------------------------------------------------------
base_model: "Qwen/Qwen2.5-3B"
tokenizer_dir: "/home/aditya/extraxtor_LLM/src/decoder_new/tokenizer_mh"
train_jsonl: "/mnt/storage/aditya/data_tr_mh.jsonl"
out_dir_stage1: "/mnt/storage/aditya/app2_adapter/adapter_stage1"
out_dir_stage2: "/mnt/storage/aditya/app2_adapter/adapter_stage2"

# --- Adapter Architecture -------------------------------------------------
speech_dim: 256
adapter_expansion: 4
adapter_dropout: 0.1
num_semantic_tokens: 500

# ==========================================================================
# STAGE 1 — Adapter Alignment (Hindi ASR)
# ==========================================================================

stage1:
  task: "ASR_HI"
  samples: 55000                 # Use full ASR_HI data
  epochs: 2                      # 1–3 epochs sufficient for alignment
  per_device_bs: 4
  grad_accum: 2                  # Effective batch = 32
  lr: 2.0e-3                     # Strong but stable
  warmup_ratio: 0.05             # Lower warmup (alignment is fast)
  weight_decay: 0.0
  max_grad_norm: 1.0
  save_steps: 1000
  save_total_limit: 2
  eval_split: 0.02
  early_stop_patience: 2         # Stop if validation plateaus

# ==========================================================================
# STAGE 2 — Full S2ST Training
# ==========================================================================

stage2:
  s2st_samples: 55000
  asr_hi_samples: 40000
  mt_samples: 30000

  epochs: 6                      # 4–6 ideal for this dataset size
  per_device_bs: 8
  grad_accum: 2                  # Effective batch = 32

  # --- Learning Rates (More Stable Than Before) ---
  adapter_lr: 3.0e-4             # Lower than sanity; avoid drift
  lora_lr: 2.0e-4
  embed_lr: 8.0e-4               # Slightly reduced to avoid embedding explosion

  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0

  # --- Multi-task weighting ---
  s2st_weight: 3.0               # Keep S2ST dominant
  asr_weight: 1.0
  mt_weight: 0.5

  save_steps: 1000
  save_total_limit: 4
  eval_split: 0.02
  early_stop_patience: 3

# ==========================================================================
# LoRA (Stage 2 only)
# ==========================================================================

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

# ==========================================================================
# General
# ==========================================================================

max_seq_len: 512
seed: 42
bf16: true

# ==========================================================================
# Sanity Check (Keep As-Is)
# ==========================================================================

sanity:
  num_samples: 50
  stage1_steps: 300
  stage2_steps: 500
  per_device_bs: 4
  stage1_lr: 3.0e-3
  stage2_lr: 1.0e-3
  num_generate: 5
